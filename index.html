        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 0;
            background: #000;
            background: radial-gradient(circle at center, #1a0014 0%, #000 100%);
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
        }
        .container {
            width: 100%; max-width: 420px;
            text-align: center; padding: 25px;
            z-index: 2;
        }
        .profile-link {
            display: block;
            width: 190px;
            height: 190px;
            margin: 0 auto 25px;
            position: relative;
            cursor: default; /* Remove o ponteiro de clique */
        }
        .profile-wrapper {
            position: relative;
            width: 100%; height: 100%;
        }
        .profile-img {
            width: 100%; height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #ff1abf;
            box-shadow: 0 0 35px rgba(255, 26, 191, 0.6);
            display: block;
        }
        .play-icon {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 26, 191, 0.85);
            border-radius: 50%;
            width: 50px; height: 50px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
            color: #fff;
            animation: pulse 1.5s infinite;
        }
        h1 { font-size: 24px; margin-bottom: 12px; color: #ff4fd8; font-weight: 700; }
        p { font-size: 16px; color: #ccc; margin-bottom: 30px; line-height: 1.5; }
        .btn {
            display: block;
            background: linear-gradient(90deg, #ff1abf, #ff4fd8);
            color: #fff;
            padding: 20px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            font-size: 18px;
            text-transform: uppercase;
            box-shadow: 0 10px 25px rgba(255, 26, 191, 0.4);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .btn:hover { transform: scale(1.05); }
        .footer { font-size: 11px; color: #444; margin-top: 30px; border-top: 1px solid #222; padding-top: 20px; }
        
        @keyframes pulse {
            0% { transform: translate(-50%, -50%) scale(1); box-shadow: 0 0 0 0 rgba(255, 26, 191, 0.7); }
            70% { transform: translate(-50%, -50%) scale(1.1); box-shadow: 0 0 0 15px rgba(255, 26, 191, 0); }
            100% { transform: translate(-50%, -50%) scale(1); box-shadow: 0 0 0 0 rgba(255, 26, 191, 0); }
        }
    </style>
