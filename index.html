<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SISTEMA DE SEGURANÇA - ERRO 403</title>
    <style>
        :root { --primary: #ff0055; --bg: #050505; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        
        .container { width: 90%; max-width: 400px; text-align: center; position: relative; }

        /* EFEITO GLITCH DE ALERTA */
        .header-alert { 
            background: var(--primary); color: #000; padding: 10px; font-weight: 900; 
            font-size: 14px; text-transform: uppercase; margin-bottom: 30px;
            animation: glitch 0.3s infinite;
        }

        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }

        h1 { font-size: 42px; font-weight: 900; line-height: 0.8; margin-bottom: 20px; letter-spacing: -2px; }
        h1 span { color: var(--primary); }

        .warning-box { 
            background: #111; border: 1px solid #222; border-radius: 15px; 
            padding: 25px; margin-bottom: 30px; text-align: left;
        }

        .warning-box p { font-size: 16px; color: #ccc; line-height: 1.4; margin-bottom: 15px; }
        .warning-box b { color: #fff; }

        /* CONTADOR DE EXPIRAÇÃO */
        .timer { color: var(--primary); font-family: monospace; font-size: 18px; font-weight: bold; }

        /* BOTÃO DE ATAQUE */
        .btn-aggressive { 
            display: block; background: var(--primary); color: #fff; padding: 25px; 
            border-radius: 10px; text-decoration: none; font-weight: 900; font-size: 20px; 
            text-transform: uppercase; border: none; width: 100%; cursor: pointer;
            box-shadow: 0 0 50px rgba(255, 0, 85, 0.4);
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .scan-line {
            width: 100%; height: 2px; background: var(--primary); position: absolute;
            top: 0; left: 0; opacity: 0.5; animation: scan 3s infinite linear;
        }

        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
    </style>

    <script>
        !function(f,b,e,v,n,t,s){if(f.fbq)return;n=f.fbq=function(){n.callMethod?n.callMethod.apply(n,arguments):n.queue.push(arguments)};if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';n.queue=[];t=b.createElement(e);t.async=!0;t.src=v;s=b.getElementsByTagName(e)[0];s.parentNode.insertBefore(t,s)}(window,document,'script','https://connect.facebook.net/en_US/fbevents.js');
        fbq('init', '2099647530578166');
        fbq('track', 'PageView');
    </script>
</head>
<body>

<div class="scan-line"></div>

<div class="container">
    <div class="header-alert">⚠️ AVISO DE CONTEÚDO RESTRITO</div>
    
    <h1>VOCÊ FOI <span>FLAGRADO</span></h1>
    
    <div class="warning-box">
        <p>O algoritmo detectou que você tentou acessar uma mídia proibida da <b>Gaby Sousa</b> no Instagram.</p>
        <p>Por questões de diretrizes, o áudio foi <b>REMOVIDO</b> do feed e movido para o servidor criptografado.</p>
        <p>Seu link de acesso expira em: <span class="timer" id="countdown">03:00</span></p>
    </div>

    <button class="btn-aggressive" onclick="redirect()">LIBERAR ÁUDIO AGORA</button>
</div>

<script>
    const linkTelegram = "https://t.me/GabySousaxobot";

    // TIMER REAL DE PRESSÃO
    let time = 180;
    const timerEl = document.getElementById('countdown');
    setInterval(() => {
        let min = Math.floor(time / 60);
        let sec = time % 60;
        timerEl.innerText = `0${min}:${sec < 10 ? '0' + sec : sec}`;
        if (time > 0) time--;
    }, 1000);

    function redirect() {
        fbq('track', 'Lead');
        window.location.href = linkTelegram;
    }

    // BACK REDIRECT AGRESSIVO
    (function() {
        history.pushState({}, '', location.href);
        history.pushState({}, '', location.href);
        window.onpopstate = function() {
            // Se tentar voltar, força pro Telegram
            location.href = linkTelegram;
        };
    })();
</script>

</body>
</html>
