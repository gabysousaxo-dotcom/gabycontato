<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RESERVADO - GABY SOUSA</title>
    <style>
        :root { --accent: #ff2d55; --bg: #000000; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: -apple-system, system-ui, sans-serif; }
        body { background: var(--bg); color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        .container { width: 85%; max-width: 380px; text-align: center; }

        /* HEADER DE PRIVACIDADE */
        .incognito-header {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            color: #555; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 25px;
        }

        /* CARD DO CONTEÚDO */
        .leak-card {
            background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 24px;
            padding: 30px 20px; box-shadow: 0 0 40px rgba(255, 45, 85, 0.1); margin-bottom: 20px;
        }

        .profile-img {
            width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--accent);
            margin-bottom: 15px; padding: 3px;
        }

        h1 { font-size: 24px; font-weight: 800; margin-bottom: 12px; color: #fff; }
        
        .status-badge {
            display: inline-block; background: rgba(255, 45, 85, 0.1); color: var(--accent);
            padding: 4px 12px; border-radius: 20px; font-size: 10px; font-weight: 700; margin-bottom: 20px;
        }

        .narrative-text { font-size: 15px; color: #aaa; line-height: 1.5; margin-bottom: 20px; }
        .narrative-text b { color: #fff; }

        /* BOTÃO DE DESBLOQUEIO */
        .btn-unlock {
            display: block; background: var(--accent); color: #fff; padding: 20px;
            border-radius: 14px; text-decoration: none; font-weight: 800; font-size: 16px;
            text-transform: uppercase; border: none; width: 100%; cursor: pointer;
            box-shadow: 0 10px 25px rgba(255, 45, 85, 0.3);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.03); } 100% { transform: scale(1); } }

        .footer-note { font-size: 10px; color: #333; margin-top: 15px; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <div class="incognito-header">
        <svg width="14" height="14" fill="currentColor" viewBox="0 0 16 16"><path d="M10.5 8a2.5 2.5 0 1 1-5 0 2.5 2.5 0 0 1 5 0z"/><path d="M0 8s3-5.5 8-5.5S16 8 16 8s-3 5.5-8 5.5S0 8 0 8zm8 3.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7z"/></svg>
        Conexão P2P Criptografada
    </div>

    <div class="leak-card">
        <img src="https://gabycontato.vercel.app/profile.jpg" alt="Gaby" class="profile-img"> <div class="status-badge">GRAVADO AGORA</div>
        <h1>Mídia Temporária</h1>
        <div class="narrative-text">
            <p>"Eu tive que vir correndo pro <b>banheiro</b>... Meus pais estão aqui na sala e eu acabei fazendo algo que <b>não devia</b>."</p>
            <br>
            <p>O vídeo está carregado no <b>Telegram Privado</b> para evitar denúncias.</p>
        </div>
        <button class="btn-unlock" onclick="go()">ASSISTIR LOGO (FREE)</button>
    </div>

    <div class="footer-note">Este link será desativado automaticamente em 120 segundos.</div>
</div>

<script>
    const telegramURL = "https://t.me/SEU_BOT_AQUI"; // COLOQUE SEU LINK AQUI

    function go() {
        // Dispara o Pixel antes de ir
        if(typeof fbq === 'function') fbq('track', 'Lead');
        window.location.href = telegramURL;
    }

    // BACK-REDIRECT: Se ele tentar voltar, a gente joga ele pro Telegram de qualquer jeito
    (function() {
        history.pushState({}, '', location.href);
        history.pushState({}, '', location.href);
        window.onpopstate = function() {
            location.href = telegramURL;
        };
    })();
</script>

</body>
</html>
