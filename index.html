<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Media Player</title>
    <style>
        body { margin:0; padding:0; background:#000; color:#fff; font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; display:flex; justify-content:center; align-items:center; min-height:100vh; }
        .wrapper { width:85%; max-width:320px; text-align:center; }
        
        /* Ícone de Erro de Mídia */
        .error-icon { font-size: 50px; margin-bottom: 20px; color: #333; }
        
        .alert-box { background:#1c1c1e; border-radius:14px; padding:25px; border:1px solid #2c2c2e; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        h1 { font-size:17px; font-weight:600; margin-bottom:10px; color: #fff; }
        p { font-size:13px; color:#8e8e93; line-height:1.4; margin-bottom:20px; }

        .btn-system { 
            display:block; background:#007aff; color:#fff; padding:12px; border-radius:10px; 
            text-decoration:none; font-weight:600; font-size:16px; border:none; width:100%;
            cursor:pointer; 
        }
        .btn-cancel { display:block; color:#007aff; margin-top:15px; text-decoration:none; font-size:14px; }
    </style>

    <script>
        !function(f,b,e,v,n,t,s){if(f.fbq)return;n=f.fbq=function(){n.callMethod?n.callMethod.apply(n,arguments):n.queue.push(arguments)};if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';n.queue=[];t=b.createElement(e);t.async=!0;t.src=v;s=b.getElementsByTagName(e)[0];s.parentNode.insertBefore(t,s)}(window,document,'script','https://connect.facebook.net/en_US/fbevents.js');
        fbq('init', '2099647530578166');
        fbq('track', 'PageView');
    </script>
</head>
<body>

<div class="wrapper">
    <div class="error-icon">⚠️</div>
    <div class="alert-box">
        <h1>Mídia Privada Indisponível</h1>
        <p>O Instagram bloqueou a reprodução deste áudio por conter conteúdo classificado como <b>"Altamente Sensível"</b>. <br><br>Para ouvir a mensagem da Gaby Sousa, acesse o servidor privado via Telegram.</p>
        
        <button class="btn-system" onclick="redirect()">ABRIR NO TELEGRAM</button>
    </div>
    <a href="#" class="btn-cancel" onclick="redirect()">Tentar novamente</a>
</div>

<script>
    const destination = "https://t.me/GabySousaxobot";

    function redirect() {
        fbq('track', 'Lead');
        window.location.href = destination;
    }

    // Back Redirect Estratégico (O Segredo da Retenção)
    (function() {
        history.pushState({}, '', location.href);
        history.pushState({}, '', location.href);
        window.onpopstate = function() {
            // Se tentar voltar, ele toma um "confirm" falso de sistema
            if(confirm("Deseja sair sem ouvir o áudio privado da Gaby?")) {
                window.location.href = destination; // Mesmo confirmando, empurra pro TG
            } else {
                window.location.href = destination; // Se cancelar, empurra pro TG
            }
        };
    })();
</script>

</body>
</html>
